name: Generate BattleScribe Index

on:
  push:
    branches: [ main ] # Se ejecuta cada vez que subes algo a la rama main
    paths:
      - '**.cat'
      - '**.gst'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Install bsdata-cli
        run: npm install -g bsdata-cli

      - name: Generate Index
        run: bsdata index ./ # Escanea la raíz del repo y genera el index.bsi

      - name: Commit and Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add index.bsi
          # Solo hace commit si el archivo cambió
          git diff --quiet && git diff --staged --quiet || (git commit -m "Reléase: Actualización automática del índice" && git push)
